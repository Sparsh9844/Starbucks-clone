<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starbucks</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      /* Carousel */
      .carousel-item img {
        width: 100%;
        height: 40vw;
        max-height: 350px;
        min-height: 180px;
        object-fit: cover;
        border-radius: 20px;
        padding: 10px 15px;
      }

      /* Navbar */
      .navbar {
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        background-color: beige;
        border-bottom: 1px solid black;
        gap: 20px;
      }

      .logo {
        width: 30px;
        height: 30px;
      }

      .brand-logo {
        width: 55px;
        height: 55px;
        object-fit: contain;
      }

      .nav-left,
      .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      /* Search */
      .search-container {
        position: relative;
        display: flex;
        align-items: center;
      }

      .search-container span {
        position: absolute;
        right: 15px;
        color: #777;
      }

      .search-bar {
        width: min(300px, 80vw);
        padding: 10px 40px 10px 15px;
        border-radius: 25px;
        border: 1px solid #ccc;
        outline: none;
      }

      /* Header */
      .header {
        background-color: green;
        color: white;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        padding: 25px;
        margin: 10px;
        border-radius: 10px;
        gap: 10px;
      }

      /* Handcrafted section */
      .handcrafted {
        padding: 40px 20px;
      }

      .img-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 20px;
        margin-top: 20px;
      }

      .img-container img {
        width: 108px;
        height: 108px;
        border-radius: 50%;
        object-fit: cover;
      }

      /* Footer */
      .footer {
        background-color: black;
        color: white;
        text-align: center;
        padding: 20px;
        margin-top: 40px;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="navbar">
        <div class="nav-left">
          <img
            class="brand-logo"
            src="../Photos/logo starbucks.png"
            alt="Starbucks logo"
          />
          <a class="nav-link" href="#">Home</a>
          <a class="nav-link" href="#">Gift</a>
          <a class="nav-link" href="#">Oder</a>
          <a class="nav-link" href="#">Pay</a>
          <a class="nav-link" href="#">Store</a>
          <a class="nav-link" href="#">Corporate Gifting</a>
        </div>
        <div class="nav-right">
          <div class="search-container">
            <span>🔍</span>

            <input
              class="search-bar"
              type="search"
              placeholder="Looking something specific?"
            />
          </div>
          <img class="logo" src="../Photos/user.png" alt="Account" />
        </div>
      </div>

      <!-- Main content goes here. -->
      <div class="main-content">
        <div class="header">
          <h2>Welcome to Starbucks!</h2>
          <p>Know more</p>
        </div>

        <div
          id="carouselExampleAutoplaying"
          class="carousel slide"
          data-bs-ride="carousel"
        >
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img
                src="../Photos/carousImg_1.jpg"
                class="d-block w-100"
                alt="image1"
              />
            </div>
            <div class="carousel-item">
              <img
                src="../Photos/carouse_img2.jpg"
                class="d-block w-100"
                alt="image2"
              />
            </div>
            <div class="carousel-item">
              <img
                src="../Photos/placeholder.svg"
                class="d-block w-100"
                alt="image3"
              />
            </div>
          </div>
          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>

        <div class="handcrafted">
          <h2>Handcrafted Curations</h2>
          <div class="img-container">
            <img
              src="../Photos/placeholder.svg"
              alt="Newly Launched"
              width="108px"
              height="108px"
              style="border-radius: 50%"
            />
            <img
              src="../Photos/Bestseller.jpg"
              alt="Bestsellers"
              width="108px"
              height="108px"
              style="border-radius: 50%"
            />
            <img
              src="../Photos/Drinks.jpg"
              alt="Drinks"
              width="108px"
              height="108px"
              style="border-radius: 50%"
            />
            <img
              src="../Photos/Food.jpg"
              alt="Food"
              width="108px"
              height="108px"
              style="border-radius: 50%"
            />
            <img
              src="../Photos/Merchandise.jpg"
              alt="Merchandise"
              width="108px"
              height="108px"
              style="border-radius: 50%"
            />
            <img
              src="../Photos/CoffeeAtHome.jpg"
              alt="Coffee at Home"
              width="108px"
              height="108px"
              style="border-radius: 50%"
            />
          </div>
        </div>
      </div>

      <div class="footer">
        <p>&copy; 2023 Starbucks. All rights reserved.</p>
      </div>

      <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"
      ></script>
    </div>
  </body>
</html>
